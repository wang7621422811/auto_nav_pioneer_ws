safety_teleop_node:
  ros__parameters:
    max_linear_speed: 0.5      # speed m/s — slow for testing
    max_angular_speed: 1.0     # rad/s
    publish_rate_hz: 20.0
    gamepad_profile: "switch_pro_native"   # ← 家用 
    # gamepad_profile: "ps4"        # ← 学校
waypoint_manager_node:
  ros__parameters:
    publish_rate_hz: 10.0
    arrival_pause_sec: 2.0
    # waypoint_file passed via CLI
pure_pursuit_controller_node:
  ros__parameters:
    max_linear_speed: 0.4
    max_angular_speed: 0.8
    lookahead_distance: 1.0
    stop_distance: 0.3
    rotate_in_place_angle: 1.0
    control_rate_hz: 20.0
fake_odom_node:
  ros__parameters:
    publish_rate_hz: 30.0
    initial_x: 0.0
    initial_y: 0.0
    initial_yaw: 0.0